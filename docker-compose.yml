services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      DEFAULT_OPENROUTER_MODEL: ${DEFAULT_OPENROUTER_MODEL}
      FRONTEND_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      MAILTRAP_TOKEN: ${MAILTRAP_TOKEN}
      MAILTRAP_SENDER_EMAIL: ${MAILTRAP_SENDER_EMAIL}
      MAILTRAP_SENDER_NAME: ${MAILTRAP_SENDER_NAME:-Plan-te}
    volumes:
      - plant_images:/app/images
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 5s
      retries: 5

  frontend:
    build: 
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
        - NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY}
        - NEXT_PUBLIC_DEFAULT_OPENROUTER_MODEL=${NEXT_PUBLIC_DEFAULT_OPENROUTER_MODEL}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      INTERNAL_API_URL: http://backend:8000
      WATCHPACK_POLLING: "true"
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY}
      NEXT_PUBLIC_DEFAULT_OPENROUTER_MODEL: ${NEXT_PUBLIC_DEFAULT_OPENROUTER_MODEL}
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  plant_images:
